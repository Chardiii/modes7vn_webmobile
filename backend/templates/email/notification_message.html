<!DOCTYPE html>
<html>
<body style="font-family:sans-serif;background:#f5f5f0;padding:30px;margin:0;">
<div style="max-width:520px;margin:auto;background:#fff;border-radius:8px;overflow:hidden;border:1px solid #e0ddd5;">

    <div style="background:#0d0d0d;padding:24px 32px;">
        <h1 style="color:#c8a96e;margin:0;letter-spacing:3px;font-size:1.4rem;">MODE S7VN</h1>
    </div>

    <div style="padding:32px;">
        <h2 style="margin-top:0;color:#111827;">💬 New Message</h2>
        <p style="color:#374151;">Hi <strong>{{ username }}</strong>,</p>
        <p style="color:#374151;"><strong>{{ sender }}</strong> sent you a message:</p>

        <div style="background:#f9fafb;border-left:4px solid #c8a96e;border-radius:4px;
                    padding:16px 20px;margin:20px 0;color:#374151;font-size:14px;line-height:1.6;">
            {{ preview }}
        </div>

        <div style="text-align:center;margin:28px 0;">
            <a href="{{ reply_url }}"
               style="background:#0d0d0d;color:#c8a96e;padding:14px 32px;border-radius:6px;
                      text-decoration:none;font-weight:bold;letter-spacing:1px;font-size:14px;">
                Reply Now
            </a>
        </div>

        <p style="color:#aaa;font-size:12px;margin-top:24px;">
            You're receiving this because you have an account on Mode S7vn.
        </p>
    </div>

    <div style="background:#f5f5f0;padding:16px 32px;text-align:center;">
        <p style="color:#aaa;font-size:.8rem;margin:0;">&copy; 2026 Mode S7vn. All rights reserved.</p>
    </div>
</div>
</body>
</html>
