<!DOCTYPE html>
<html>
<body style="font-family:sans-serif;background:#f5f5f0;padding:30px;">
<div style="max-width:520px;margin:auto;background:#fff;border-radius:8px;overflow:hidden;border:1px solid #e0ddd5;">
    <div style="background:#0d0d0d;padding:24px 32px;">
        <h1 style="color:#c8a96e;margin:0;letter-spacing:3px;font-size:1.4rem;">MODE S7VN</h1>
    </div>
    <div style="padding:32px;">
        <h2 style="margin-top:0;color:#065f46;">✓ Account Approved</h2>
        <p>Hi <strong>{{ username }}</strong>,</p>
        <p>Great news — your Mode S7vn account has been <strong>reviewed and approved</strong> by our admin team. You can now log in and start using the platform.</p>
        <div style="text-align:center;margin:32px 0;">
            <a href="{{ login_url }}"
               style="background:#0d0d0d;color:#c8a96e;padding:14px 32px;border-radius:6px;text-decoration:none;font-weight:bold;letter-spacing:1px;">
                Log In Now
            </a>
        </div>
        <p style="color:#888;font-size:.85rem;">Your registered role: <strong>{{ role|upper }}</strong></p>
    </div>
    <div style="background:#f5f5f0;padding:16px 32px;text-align:center;">
        <p style="color:#aaa;font-size:.8rem;margin:0;">&copy; 2024 Mode S7vn. All rights reserved.</p>
    </div>
</div>
</body>
</html>
